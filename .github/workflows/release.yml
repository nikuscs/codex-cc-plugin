name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version from package.json, without the leading v
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate requested version matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          INPUT_VERSION="${{ inputs.version }}"
          if [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
            echo "Requested version ($INPUT_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build standalone binaries
        run: |
          mkdir -p dist
          bun build bin/claude-codex.mjs --compile --target=bun-darwin-arm64 --outfile dist/claude-codex-darwin-arm64
          bun build bin/claude-codex.mjs --compile --target=bun-darwin-x64 --outfile dist/claude-codex-darwin-x64
          bun build bin/claude-codex.mjs --compile --target=bun-linux-arm64 --outfile dist/claude-codex-linux-arm64
          bun build bin/claude-codex.mjs --compile --target=bun-linux-x64 --outfile dist/claude-codex-linux-x64

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 claude-codex-* > SHA256SUMS

      - name: Smoke test linux-x64 binary
        run: |
          chmod +x dist/claude-codex-linux-x64
          ./dist/claude-codex-linux-x64 --help

      - name: Create and push tag
        run: |
          TAG="v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally"
          else
            git tag "$TAG"
          fi
          git push origin "$TAG"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/claude-codex-darwin-arm64
            dist/claude-codex-darwin-x64
            dist/claude-codex-linux-arm64
            dist/claude-codex-linux-x64
            dist/SHA256SUMS
